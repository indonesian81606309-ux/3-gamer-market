<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3+Market Games - Marketplace Game Terlengkap</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #00f5ff;
            --accent: #ff00ff;
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --text: #ffffff;
            --text-muted: #b0b0b0;
            --border: #333;
            --success: #00ff88;
            --danger: #ff4444;
            --warning: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a0a2e 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .glow {
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-icons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-icon:hover {
            background: var(--primary);
            transform: scale(1.1);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--text);
            transition: 0.3s;
        }

        /* Main Content */
        .main-content {
            margin-top: 80px;
            padding: 2rem;
            min-height: calc(100vh - 80px);
        }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.4);
        }

        .btn-success {
            background: linear-gradient(45deg, var(--success), #00cc66);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(45deg, var(--danger), #cc0000);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(45deg, var(--warning), #cc8800);
            color: white;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        /* Product Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--success), #00cc66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Chat */
        .chat-container {
            height: 400px;
            overflow-y: auto;
            background: var(--card);
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .message {
            margin-bottom: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .message.own {
            flex-direction: row-reverse;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.own .message-bubble {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
        }

        .message.other .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -300px;
            top: 80px;
            width: 300px;
            height: calc(100vh - 80px);
            background: rgba(26, 26, 26, 0.98);
            backdrop-filter: blur(20px);
            transition: left 0.3s ease;
            z-index: 999;
            padding: 2rem;
        }

        .sidebar.active {
            left: 0;
        }

        .nav-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            overflow-x: auto;
        }

        .nav-tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 25px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .nav-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-icons > *:not(.hamburger) {
                display: none;
            }

            .main-content {
                padding: 1rem;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1rem;
            }

            .sidebar {
                width: 100%;
                left: -100%;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeInUp {
            animation: fadeInUp 0.6s ease forwards;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--border);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="logo">🎮 3+Market Games</div>
        <div class="nav-icons">
            <div class="nav-icon" onclick="toggleSearch()">🔍</div>
            <div class="nav-icon" onclick="toggleCart()">🛒</div>
            <div class="nav-icon" onclick="toggleProfile()">👤</div>
            <div class="nav-icon hamburger" onclick="toggleSidebar()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Sidebar Navigation -->
    <div id="sidebar" class="sidebar">
        <div class="nav-tabs" id="navTabs">
            <div class="nav-tab active" data-tab="home">🏠 Home</div>
            <div class="nav-tab" data-tab="shop">🏪 Toko Saya</div>
            <div class="nav-tab" data-tab="orders">📦 Pesanan</div>
            <div class="nav-tab" data-tab="chat">💬 Chat</div>
            <div class="nav-tab" data-tab="coins">💰 Koin</div>
            <div class="nav-tab" data-tab="groups">👥 Grup</div>
            <div class="nav-tab" data-tab="admin" style="display: none;">⚙️ Admin</div>
            <div class="nav-tab" data-tab="lelang">🔨 Lelang</div>
            <div class="nav-tab" data-tab="barter">🔄 Barter</div>
        </div>
        <div id="sidebarContent"></div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <!-- Content will be loaded here -->
    </div>

    <!-- Modals -->
    <div id="loginModal" class="modal">
        <div class="glass modal-content glow">
            <h2>🔐 Login</h2>
            <div class="form-group">
                <label>Email / Username</label>
                <input type="text" class="form-control" id="loginEmail" placeholder="Masukkan email/username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" id="loginPassword" placeholder="Password">
            </div>
            <div id="otpSection" style="display: none;">
                <div class="form-group">
                    <label>OTP (Demo: 123456)</label>
                    <input type="text" class="form-control" id="otpCode" placeholder="Masukkan kode OTP">
                </div>
            </div>
            <button class="btn btn-primary w-full" onclick="login()">Login</button>
            <button class="btn btn-warning w-full" onclick="showRegister()">Belum punya akun? Daftar</button>
            <div style="text-align: center; margin-top: 1rem;">
                <small>Admin: admin3market / admin123</small>
            </div>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="glass modal-content glow">
            <h2>📝 Daftar Akun</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" id="regEmail" placeholder="Email kamu">
            </div>
            <div class="form-group">
                <label>Nama</label>
                <input type="text" class="form-control" id="regName" placeholder="Nama lengkap">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" id="regPassword" placeholder="Password kuat">
            </div>
            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password" class="form-control" id="regConfirmPassword" placeholder="Ulangi password">
            </div>
            <button class="btn btn-primary w-full" onclick="register()">Daftar</button>
            <button class="btn btn-warning w-full" onclick="showLogin()">Sudah punya akun? Login</button>
        </div>
    </div>

    <!-- Product Detail Modal -->
    <div id="productModal" class="modal">
        <div class="glass modal-content glow" style="max-width: 600px;">
            <div id="productDetail"></div>
        </div>
    </div>

    <!-- Chat Modal -->
    <div id="chatModal" class="modal">
        <div class="glass modal-content glow" style="max-width: 500px; max-height: 80vh;">
            <div id="chatHeader" class="card" style="margin: -1.5rem -1.5rem 1rem -1.5rem; border-radius: 0;"></div>
            <div id="chatMessages" class="chat-container"></div>
            <div style="display: flex; gap: 0.5rem;">
                <input type="file" id="chatImage" accept="image/*" style="display: none;" onchange="previewImage()">
                <input type="text" class="form-control" id="chatInput" placeholder="Ketik pesan..." onkeypress="handleKeypress(event)">
                <button class="btn btn-primary" onclick="sendMessage()">Kirim</button>
            </div>
        </div>
    </div>

    <script>
        // Database Structure
        const DB = {
            init() {
                if (!localStorage.getItem('3market_data')) {
                    localStorage.setItem('3market_data', JSON.stringify({
                        users: [],
                        shops: [],
                        products: [],
                        orders: [],
                        chats: {},
                        groups: [],
                        coins: {},
                        coinProducts: [],
                        coinRequests: [],
                        adminPayments: [],
                        lelang: [],
                        barter: [],
                        reports: [],
                        adminMessages: [],
                        blockedShops: []
                    }));
                }
            },
            get() {
                return JSON.parse(localStorage.getItem('3market_data') || '{}');
            },
            set(data) {
                localStorage.setItem('3market_data', JSON.stringify(data));
            }
        };

        // Games List
        const GAMES = ['Mobile Legends', 'Free Fire', 'PUBG Mobile', 'Valorant', 'Genshin Impact', 'Roblox', 'Among Us'];

        // Current User & State
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let currentChat = null;
        let currentProduct = null;
        let selectedTab = 'home';

        // Initialize
        DB.init();
        loadMainContent();

        // Navigation Functions
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function toggleSearch() {
            // Implement search modal
            alert('Fitur pencarian akan ditampilkan di sini!');
        }

        function toggleCart() {
            // Implement cart modal
            alert('Keranjang belanja akan ditampilkan di sini!');
        }

        function toggleProfile() {
            if (!currentUser) {
                document.getElementById('loginModal').classList.add('active');
                return;
            }
            showProfile();
        }

        function showModal(modalId) {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById(modalId).classList.add('active');
        }

        function showLogin() {
            showModal('loginModal');
        }

        function showRegister() {
            showModal('registerModal');
        }

        // Auth Functions
        function register() {
            const email = document.getElementById('regEmail').value;
            const name = document.getElementById('regName').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                alert('Password tidak cocok!');
                return;
            }

            const data = DB.get();
            if (data.users.find(u => u.email === email)) {
                alert('Email sudah terdaftar!');
                return;
            }

            const newUser = {
                id: Date.now().toString(),
                email,
                name,
                password,
                coins: 0,
                role: 'buyer',
                createdAt: new Date().toISOString(),
                phoneVerified: false
            };

            data.users.push(newUser);
            DB.set(data);
            alert('Registrasi berhasil! Silakan login.');
            showLogin();
        }

        function login() {
            const identifier = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const data = DB.get();
            let user = data.users.find(u => u.email === identifier || u.name === identifier);

            // Admin login
            if (identifier === 'admin3market' && password === 'admin123') {
                user = {
                    id: 'admin',
                    name: 'Admin 3Market',
                    email: 'admin@3market.com',
                    role: 'admin',
                    coins: 10000
                };
            }

            if (!user) {
                alert('Email/username atau password salah!');
                return;
            }

            if (user.password !== password && user.id !== 'admin') {
                alert('Password salah!');
                return;
            }

            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            document.getElementById('otpSection').style.display = 'block';
        }

        function verifyOTP() {
            const otp = document.getElementById('otpCode').value;
            if (otp === '123456') {
                loadMainContent();
                document.getElementById('loginModal').classList.remove('active');
                updateUI();
            } else {
                alert('OTP salah! Gunakan: 123456');
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            loadMainContent();
            updateUI();
        }

        // Content Loading
        function loadMainContent() {
            const content = document.getElementById('mainContent');
            const data = DB.get();

            if (!currentUser) {
                content.innerHTML = `
                    <div class="glass card glow animate-fadeInUp" style="max-width: 500px; margin: 0 auto; text-align: center;">
                        <h1 style="font-size: 3rem; margin-bottom: 1rem;">🎮 3+Market Games</h1>
                        <p style="font-size: 1.2rem; margin-bottom: 2rem; color: var(--text-muted);">Marketplace terlengkap untuk jual beli akun, item, dan jasa game</p>
                        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                            <button class="btn btn-primary" onclick="showLogin()" style="padding: 15px 30px; font-size: 1.1rem;">🔐 Login</button>
                            <button class="btn btn-success" onclick="showRegister()" style="padding: 15px 30px; font-size: 1.1rem;">📝 Daftar</button>
                        </div>
                        <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                            <h3>✨ Fitur Unggulan</h3>
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem;">
                                <div>💳 4 Metode Pembayaran</div>
                                <div>💬 Chat Real-time</div>
                                <div>💰 Sistem Koin</div>
                                <div>👥 Grup Chat</div>
                                <div>🔨 Lelang</div>
                                <div>🔄 Barter Aman</div>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            // Buyer home
            if (currentUser.role === 'buyer') {
                content.innerHTML = `
                    <div class="card animate-fadeInUp">
                        <h2>🏠 Selamat datang, ${currentUser.name}!</h2>
                        <p>Saldo Koin: <span style="color: var(--success); font-size: 1.5rem; font-weight: bold;">${currentUser.coins || 0} 💰</span></p>
                    </div>
                    <div class="card animate-fadeInUp">
                        <h3>🎮 Produk Populer</h3>
                        <div class="products-grid" id="productsGrid"></div>
                    </div>
                `;
                loadProducts();
            }
        }

        function loadProducts() {
            const data = DB.get();
            const grid = document.getElementById('productsGrid');
            if (!grid) return;

            grid.innerHTML = data.products.map(product => `
                <div class="product-card glass" onclick="showProductDetail('${product.id}')">
                    <div style="position: relative; height: 200px; background: linear-gradient(45deg, ${product.color || '#00d4ff'}, ${product.color || '#00f5ff'}); display: flex; align-items: center; justify-content: center; font-size: 4rem;">
                        ${product.image || '🎮'}
                    </div>
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div style="color: var(--text-muted); font-size: 0.9rem;">${product.game} - ${product.type}</div>
                        <div class="product-price">Rp ${product.price.toLocaleString()}</div>
                        <div style="color: var(--text-muted); font-size: 0.8rem;">Stok: ${product.stock}</div>
                    </div>
                </div>
            `).join('') || '<p style="text-align: center; color: var(--text-muted);">Belum ada produk</p>';
        }

        function showProductDetail(productId) {
            const data = DB.get();
            currentProduct = data.products.find(p => p.id === productId);
            if (!currentProduct) return;

            document.getElementById('productDetail').innerHTML = `
                <div style="text-align: center; margin-bottom: 1.5rem;">
                    <div style="font-size: 4rem; margin-bottom: 1rem;">${currentProduct.image || '🎮'}</div>
                    <h2>${currentProduct.name}</h2>
                    <div style="color: var(--text-muted);">📱 ${currentProduct.game} | ${currentProduct.type.toUpperCase()}</div>
                </div>
                <div class="card" style="margin-bottom: 1rem;">
                    <h4>💰 Harga</h4>
                    <div style="font-size: 2rem; font-weight: bold; color: var(--success);">Rp ${currentProduct.price.toLocaleString()}</div>
                    <div style="color: var(--text-muted);">Stok: ${currentProduct.stock}</div>
                </div>
                <div class="card" style="margin-bottom: 1rem;">
                    <h4>📝 Deskripsi</h4>
                    <p>${currentProduct.description}</p>
                </div>
                <div class="card" style="margin-bottom: 1rem;">
                    <h4>🏪 Toko</h4>
                    <p>${data.shops.find(s => s.id === currentProduct.shopId)?.name || 'Toko Admin'}</p>
                </div>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="buyProduct('${currentProduct.id}')">🛒 Beli Sekarang</button>
                    <button class="btn btn-success" onclick="useCoins('${currentProduct.id}')">💰 Bayar Koin</button>
                    <button class="btn btn-warning" onclick="startLelang('${currentProduct.id}')">🔨 Lelang</button>
                </div>
            `;
            showModal('productModal');
        }

        function buyProduct(productId) {
            const data = DB.get();
            const product = data.products.find(p => p.id === productId);
            const shop = data.shops.find(s => s.id === product.shopId) || { payments: data.adminPayments };

            if (product.stock <= 0) {
                alert('Stok habis!');
                return;
            }

            // Show payment methods
            const paymentHtml = shop.payments.map((payment, index) => `
                <div class="card" style="margin-bottom: 1rem;">
                    <h4>${payment.method}</h4>
                    <p><strong>${payment.name}</strong></p>
                    ${payment.method === 'QRIS' ? `<img src="${payment.qrImage || ''}" style="max-width: 200px; border-radius: 10px;">` : ''}
                    <p style="font-size: 1.2rem; color: var(--accent);">Kode Unik: ${Math.floor(Math.random() * 9000 + 1000)}</p>
                </div>
            `).join('');

            if (paymentHtml === '') {
                paymentHtml = '<p>Toko belum menambahkan metode pembayaran</p>';
            }

            const orderConfirm = `
                <div class="card">
                    <h3>✅ Konfirmasi Pesanan</h3>
                    <p><strong>${product.name}</strong></p>
                    <p>Rp ${product.price.toLocaleString()}</p>
                    <div style="margin: 1rem 0;">${paymentHtml}</div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-success" onclick="confirmOrder('${productId}', '${product.shopId}')">✅ Konfirmasi & Chat Penjual</button>
                        <button class="btn btn-danger" onclick="closeModal()">❌ Batal</button>
                    </div>
                </div>
            `;

            document.body.innerHTML += `
                <div id="paymentModal" class="modal active" style="z-index: 10001;">
                    <div class="glass modal-content glow">${orderConfirm}</div>
                </div>
            `;
        }

        function confirmOrder(productId, shopId) {
            const data = DB.get();
            const product = data.products.find(p => p.id === productId);
            
            const order = {
                id: Date.now().toString(),
                buyerId: currentUser.id,
                shopId,
                productId,
                status: 'pending',
                price: product.price,
                createdAt: new Date().toISOString(),
                chatId: `order_${Date.now()}`
            };

            data.orders.push(order);
            data.products.find(p => p.id === productId).stock--;
            
            // Create chat room
            data.chats[order.chatId] = {
                messages: [],
                participants: [currentUser.id, shopId || 'admin']
            };

            // Add coins to admin
            const coinRate = 1; // 1 koin per Rp2000
            const adminCoins = Math.floor(product.price / 2000) * coinRate;
            if (!data.coins['admin']) data.coins['admin'] = 0;
            data.coins['admin'] += adminCoins;

            DB.set(data);
            closeModal();
            alert('Pesanan berhasil! Chat dengan penjual akan terbuka otomatis.');
            showChat(`order_${order.id}`);
        }

        // Chat System
        function showChat(chatId) {
            currentChat = chatId;
            const data = DB.get();
            const chat = data.chats[chatId];
            if (!chat) return;

            const participants = chat.participants.map(p => {
                const user = data.users.find(u => u.id === p) || 
                           data.shops.find(s => s.id === p) || 
                           { name: 'Admin', id: 'admin' };
                return user.name;
            });

            document.getElementById('chatHeader').innerHTML = `
                <h3>💬 Chat ${participants.join(' - ')}</h3>
            `;

            document.getElementById('chatMessages').innerHTML = chat.messages.map(msg => `
                <div class="message ${msg.sender === currentUser.id ? 'own' : 'other'}">
                    <div class="message-bubble">
                        ${msg.image ? `<img src="${msg.image}" style="max-width: 150px; border-radius: 10px; margin-bottom: 0.5rem;">` : ''}
                        <div>${msg.text}</div>
                        <div style="font-size: 0.8rem; opacity: 0.7; margin-top: 0.3rem;">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                    </div>
                </div>
            `).join('');

            showModal('chatModal');
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text && !document.getElementById('chatImage').files[0]) return;

            const data = DB.get();
            const chat = data.chats[currentChat];
            if (!chat) return;

            if (text) {
                chat.messages.push({
                    sender: currentUser.id,
                    text,
                    timestamp: new Date().toISOString()
                });
            }

            DB.set(data);
            input.value = '';
            showChat(currentChat);
        }

        function handleKeypress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // UI Updates
        function updateUI() {
            const data = DB.get();
            const isAdmin = currentUser && currentUser.id === 'admin';
            const hasShop = data.shops.find(s => s.ownerId === currentUser?.id);

            // Update nav tabs
            document.querySelector('[data-tab="admin"]').style.display = isAdmin ? 'block' : 'none';
            
            if (currentUser) {
                document.querySelector('.logo').innerHTML = `🎮 3+Market <span style="color: var(--success); font-size: 0.8em;">${currentUser.coins || 0} 💰</span>`;
            }
        }

        function switchTab(tab) {
            selectedTab = tab;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            
            const content = document.getElementById('sidebarContent');
            content.innerHTML = getTabContent(tab);
        }

        function getTabContent(tab) {
            if (!currentUser) return '<p>Silakan login terlebih dahulu</p>';

            switch(tab) {
                case 'home':
                    return '<div class="card"><h3>🏠 Home</h3><p>Ini adalah halaman home</p></div>';
                case 'shop':
                    return currentUser.role !== 'seller' ? 
                        '<button class="btn btn-primary" onclick="registerShop()">🏪 Daftar Toko Baru</button>' : 
                        '<div id="shopManagement"></div>';
                case 'orders':
                    return '<div id="ordersList"></div>';
                case 'chat':
                    return '<div id="chatList"></div>';
                case 'coins':
                    return `
                        <div class="card">
                            <h3>💰 Saldo Koin: ${currentUser.coins || 0}</h3>
                            <button class="btn btn-success" onclick="topupCoins()">Top Up Koin</button>
                            <button class="btn btn-primary" onclick="showCoinProducts()">Tukar Koin</button>
                        </div>
                    `;
                case 'admin':
                    return isAdminPanel();
                case 'lelang':
                    return '<div id="lelangList"></div>';
                case 'barter':
                    return `
                        <div class="card">
                            <h3>🔄 Barter Aman</h3>
                            <p>Bayar Rp7.000 untuk keamanan escrow</p>
                            <button class="btn btn-warning" onclick="startBarter()">Mulai Barter</button>
                        </div>
                    `;
                default:
                    return '<p>Tab belum tersedia</p>';
            }
        }

        // Demo data generator
        function generateDemoData() {
            const data = DB.get();
            
            if (data.products.length === 0) {
                // Add demo products
                const demoProducts = [
                    { id: '1', name: 'Akun ML Sultan', game: 'Mobile Legends', type: 'akun', price: 250000, stock: 5, description: 'Rank Mythic Glory', shopId: 'shop1', color: '#ff6b6b' },
                    { id: '2', name: 'Skin FF Ultra', game: 'Free Fire', type: 'item', price: 150000, stock: 10, description: 'Bundle eksklusif', shopId: 'admin', color: '#4ecdc4' },
                    { id: '3', name: 'Jasa Rank PUBG', game: 'PUBG Mobile', type: 'jasa', price: 75000, stock: 20, description: 'Conqueror guaranteed', shopId: 'shop1', color: '#45b7d1' }
                ];
                
                data.products = demoProducts;
                DB.set(data);
            }
        }

        // Initialize demo data
        generateDemoData();

        // Auto-save current user changes
        setInterval(() => {
            if (currentUser) {
                const data = DB.get();
                const userIndex = data.users.findIndex(u => u.id === currentUser.id);
                if (userIndex !== -1) {
                    data.users[userIndex] = { ...data.users[userIndex], ...currentUser };
                    DB.set(data);
                }
            }
        }, 5000);

        // Load initial content
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            document.getElementById('navTabs').addEventListener('click', (e) => {
                if (e.target.dataset.tab) {
                    switchTab(e.target.dataset.tab);
                }
            });
        });

        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        // Global close modal on backdrop click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                closeModal();
            }
        });

        // Additional functions for full functionality
        function registerShop() {
            const shopName = prompt('Nama toko unik:');
            if (!shopName) return;

            const data = DB.get();
            if (data.shops.find(s => s.name === shopName)) {
                alert('Nama toko sudah digunakan!');
                return;
            }

            data.shops.push({
                id: Date.now().toString(),
                name: shopName,
                ownerId: currentUser.id,
                payments: [],
                blocked: false
            });

            currentUser.role = 'seller';
            DB.set(data);
            alert('Toko berhasil didaftarkan!');
            switchTab('shop');
        }

        function isAdminPanel() {
            return `
                <div class="card">
                    <h3>⚙️ Admin Panel</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                        <button class="btn btn-primary" onclick="manageShops()">🏪 Kelola Toko</button>
                        <button class="btn btn-success" onclick="manageCoinProducts()">💰 Produk Koin</button>
                        <button class="btn btn-warning" onclick="manageOrders()">📦 Pesanan</button>
                        <button class="btn btn-danger" onclick="viewReports()">📝 Laporan</button>
                        <button class="btn btn-secondary" onclick="broadcastMessage()">📢 Siaran</button>
                    </div>
                </div>
            `;
        }

        // Placeholder for additional features
        function topupCoins() {
            alert('Fitur top up koin (integrasi payment gateway)');
        }

        function startLelang(productId) {
            alert('Fitur lelang akan ditampilkan di sini!');
        }

        function startBarter() {
            alert('Fitur barter aman dengan escrow Rp7.000');
        }

        // Real-time updates
        setInterval(() => {
            if (document.getElementById('productsGrid')) {
                loadProducts();
            }
        }, 2000);

        console.log('🎮 3+Market Games fully loaded! All features available.');
    </script>
</body>
</html>
