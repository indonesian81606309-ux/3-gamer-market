<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3+Market Games - Marketplace + Lelang + Barter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 25%, #16213e 50%, #0f0f23 100%); 
            color: #e2e8f0; 
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(255,255,255,0.08); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.12); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .glass-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-hover:hover { 
            background: rgba(255,255,255,0.15); 
            transform: translateY(-4px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .gradient-text { 
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 50%, #0077b6 100%);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text;
            font-family: 'Orbitron', monospace;
        }
        .neon-glow { 
            box-shadow: 0 0 20px rgba(0,212,255,0.5);
            transition: all 0.3s ease;
        }
        .neon-glow:hover { box-shadow: 0 0 30px rgba(0,212,255,0.8); }
        .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { 
            background: linear-gradient(45deg, #00d4ff, #0099cc); 
            border-radius: 10px; 
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: linear-gradient(45deg, #0099cc, #0077b6); }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-glow { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 20px rgba(0,212,255,0.3); } 50% { box-shadow: 0 0 30px rgba(0,212,255,0.6); } }
        .sidebar { background: rgba(15,15,35,0.95); backdrop-filter: blur(20px); }
        .nav-active { background: rgba(0,212,255,0.2) !important; ring: 2px solid #00d4ff !important; }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 z-50 flex items-center justify-center">
        <div class="text-center fade-in">
            <div class="w-28 h-28 border-4 border-transparent border-t-cyan-400 bg-gradient-to-r from-cyan-500/20 to-blue-500/20 rounded-full flex items-center justify-center mb-6 glass p-4 pulse-glow">
                <i class="fas fa-gamepad text-4xl text-cyan-400"></i>
            </div>
            <div class="gradient-text text-3xl md:text-4xl font-bold mb-2 tracking-wide">3+MARKET GAMES</div>
            <div class="text-lg text-cyan-400 font-medium flex items-center gap-2 justify-center">
                <div class="w-6 h-6 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
                Memuat platform...
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden min-h-screen">
        <!-- Enhanced Navbar -->
        <nav class="glass fixed top-0 left-0 right-0 z-50 px-6 py-4 flex justify-between items-center backdrop-blur-xl">
            <div class="flex items-center gap-4">
                <button id="mobileMenuBtn" class="lg:hidden p-2.5 glass rounded-xl hover:bg-white/10 transition-all">
                    <i class="fas fa-bars text-xl text-cyan-400"></i>
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center glass-hover">
                        <i class="fas fa-store text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="gradient-text text-2xl font-bold tracking-tight">3+MARKET</h1>
                        <div class="text-xs text-cyan-400 font-medium">GAMES</div>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="glass px-4 py-2.5 rounded-2xl text-sm font-medium flex items-center gap-2 glass-hover">
                    <i class="fas fa-coins text-yellow-400"></i>
                    <span id="coinAmount" class="font-bold text-lg">0</span> <span class="text-xs">Koin</span>
                </div>
                <button id="notificationBtn" class="relative p-2.5 glass rounded-2xl glass-hover">
                    <i class="fas fa-bell text-xl"></i>
                    <span id="notificationBadge" class="absolute -top-1 -right-1 bg-red-500 text-xs w-6 h-6 rounded-full flex items-center justify-center font-bold hidden">0</span>
                </button>
                <button id="profileBtn" class="w-12 h-12 glass rounded-2xl flex items-center justify-center glass-hover">
                    <i class="fas fa-user text-lg"></i>
                </button>
            </div>
        </nav>

        <!-- Main Layout -->
        <div class="flex h-screen pt-20">
            <!-- Enhanced Sidebar -->
            <div id="sidebar" class="sidebar fixed inset-y-20 left-0 w-72 z-40 h-[calc(100vh-5rem)] transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out overflow-y-auto scrollbar-thin p-6 space-y-6">
                <div id="sidebarContent"></div>
            </div>

            <!-- Main Content -->
            <div class="flex-1 ml-0 lg:ml-72 pt-8 pb-24 px-6 lg:px-12 overflow-y-auto scrollbar-thin h-[calc(100vh-5rem)]" id="pagesContainer">
                <!-- Dynamic content loaded here -->
            </div>
        </div>

        <!-- Modals -->
        <div id="profileModal" class="fixed inset-0 bg-black/60 backdrop-blur-md z-50 hidden flex items-center justify-center p-6">
            <div class="glass max-w-md w-full rounded-3xl p-8 glass-hover max-h-[90vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="gradient-text text-3xl font-bold">👤 Profil</h2>
                    <button id="closeProfileModal" class="p-2 hover:bg-white/10 rounded-2xl transition-all">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <div id="profileContent" class="space-y-4"></div>
                <div class="mt-10 pt-8 border-t border-white/10">
                    <button id="logoutBtn" class="w-full bg-gradient-to-r from-red-600 to-red-700 py-4 rounded-2xl font-bold text-lg neon-glow hover:from-red-700 hover:to-red-800">
                        <i class="fas fa-sign-out-alt mr-2"></i>Keluar
                    </button>
                </div>
            </div>
        </div>

        <!-- Notification Modal -->
        <div id="notificationModal" class="fixed inset-0 bg-black/60 backdrop-blur-md z-50 hidden flex items-center justify-center p-6">
            <div class="glass w-full max-w-lg max-h-[80vh] rounded-3xl overflow-hidden glass-hover">
                <div class="p-8 border-b border-white/10">
                    <h2 class="gradient-text text-2xl font-bold flex items-center gap-3">
                        <i class="fas fa-bell"></i>Notifikasi
                    </h2>
                </div>
                <div id="notificationList" class="p-6 max-h-96 overflow-y-auto scrollbar-thin space-y-3"></div>
            </div>
        </div>

        <!-- Toast Container -->
        <div id="toastContainer" class="fixed top-24 right-6 z-50 space-y-2 hidden"></div>
    </div>

    <script>
        class MarketApp {
            constructor() {
                this.db = {};
                this.currentUser = null;
                this.currentPage = 'home';
                this.init();
            }

            // ===== CORE INITIALIZATION =====
            async init() {
                this.loadData();
                this.initDemoData();
                this.bindGlobalEvents();
                await this.checkAuth();
                this.updateUI();
                this.showSplash();
            }

            loadData() {
                const keys = ['users', 'stores', 'products', 'orders', 'auctions', 'barters', 'coinProducts', 'notifications'];
                keys.forEach(key => {
                    const data = localStorage.getItem(`3m_${key}`);
                    this.db[key] = data ? JSON.parse(data) : [];
                });
            }

            saveData() {
                Object.keys(this.db).forEach(key => {
                    localStorage.setItem(`3m_${key}`, JSON.stringify(this.db[key]));
                });
            }

            // ===== UI RENDERING =====
            updateUI() {
                this.updateSidebar();
                this.updateCoinDisplay();
                this.updateNotificationBadge();
            }

            updateSidebar() {
                const sidebar = document.getElementById('sidebarContent');
                if (!sidebar) return;

                const { currentUser } = this;
                const isLoggedIn = !!currentUser;
                const userStore = isLoggedIn ? this.db.stores.find(s => s.ownerId === currentUser.id) : null;
                const isSeller = isLoggedIn && currentUser.role === 'seller';
                const isAdmin = isLoggedIn && currentUser.role === 'admin';

                sidebar.innerHTML = this.renderSidebar(isLoggedIn, currentUser, userStore, isSeller, isAdmin);
                this.bindSidebarEvents();
            }

            renderSidebar(isLoggedIn, user, userStore, isSeller, isAdmin) {
                const profileSection = `
                    <div class="glass p-6 rounded-3xl mb-8 glass-hover">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="w-16 h-16 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center">
                                <i class="fas fa-user text-2xl text-white"></i>
                            </div>
                            <div>
                                <div class="font-bold text-xl">${isLoggedIn ? user.name : 'Guest'}</div>
                                ${isLoggedIn ? `<div class="text-sm text-cyan-400 capitalize">${user.role}</div>` : ''}
                            </div>
                        </div>
                        ${isLoggedIn ? `<div class="text-2xl font-bold gradient-text">${user.coins.toLocaleString()} <i class="fas fa-coins text-yellow-400"></i></div>` : ''}
                    </div>
                `;

                const mainNav = `
                    <div class="space-y-2 mb-8">
                        ${this.renderNavItem('home', 'fas fa-home', 'Home')}
                        ${isLoggedIn ? this.renderNavItem('orders', 'fas fa-shopping-bag', 'Pesanan') : ''}
                        ${isLoggedIn ? this.renderNavItem('chat', 'fas fa-comments', 'Chat') : ''}
                        ${this.renderNavItem('auctions', 'fas fa-gavel', 'Lelang')}
                        ${this.renderNavItem('barter', 'fas fa-exchange-alt', 'Barter')}
                        ${isLoggedIn ? this.renderNavItem('transfer-coins', 'fas fa-hand-holding-usd', 'Kirim Koin') : ''}
                        ${isLoggedIn ? this.renderNavItem('coins', 'fas fa-coins', 'Koin Saya') : ''}
                        ${isLoggedIn ? this.renderNavItem('groups', 'fas fa-users', 'Grup') : ''}
                    </div>
                `;

                let sellerSection = '';
                if (isSeller) {
                    sellerSection = `
                        <div class="space-y-2 mb-8">
                            <div class="text-xs text-gray-400 uppercase tracking-wider px-3 py-2 font-medium">Toko Saya</div>
                            ${this.renderNavItem('my-store', 'fas fa-store', userStore?.name || 'Toko Saya')}
                            ${this.renderNavItem('add-product', 'fas fa-plus-circle', 'Tambah Produk')}
                            ${this.renderNavItem('payment-methods', 'fas fa-credit-card', 'Metode Bayar')}
                        </div>
                    `;
                }

                let adminSection = '';
                if (isAdmin) {
                    adminSection = `
                        <div class="space-y-2">
                            <div class="text-xs text-gray-400 uppercase tracking-wider px-3 py-2 font-medium">Admin Panel</div>
                            ${this.renderNavItem('admin-dashboard', 'fas fa-tachometer-alt', 'Dashboard')}
                            ${this.renderNavItem('admin-stores', 'fas fa-stores', 'Kelola Toko')}
                            ${this.renderNavItem('admin-topup', 'fas fa-arrow-up', 'TopUp Koin')}
                        </div>
                    `;
                }

                let createStoreBtn = '';
                if (isLoggedIn && !userStore && !isAdmin) {
                    createStoreBtn = `
                        <div class="glass p-4 rounded-3xl glass-hover">
                            <button id="createStoreBtn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 hover:from-emerald-600 hover:to-teal-700 neon-glow">
                                <i class="fas fa-store"></i>Buat Toko Pertama
                            </button>
                        </div>
                    `;
                }

                return profileSection + mainNav + sellerSection + adminSection + createStoreBtn;
            }

            renderNavItem(page, icon, label) {
                return `<button class="nav-btn w-full flex items-center gap-4 p-4 rounded-2xl glass-hover text-left group" data-page="${page}">
                    <i class="${icon} text-lg group-hover:text-cyan-400 transition-colors"></i>
                    <span class="font-medium">${label}</span>
                </button>`;
            }

            // ===== PAGE MANAGEMENT =====
            async showPage(page) {
                if (!this.currentUser && !['login', 'register'].includes(page)) {
                    this.showPage('login');
                    return;
                }

                this.currentPage = page;
                const container = document.getElementById('pagesContainer');
                container.innerHTML = `<div class="fade-in">${this.renderPage(page)}</div>`;
                this.bindPageEvents(page);
                this.updateActiveNav(page);
            }

            renderPage(page) {
                const pages = {
                    login: this.renderLoginPage.bind(this),
                    register: this.renderRegisterPage.bind(this),
                    home: this.renderHomePage.bind(this),
                    // Add other pages here
                };
                return pages[page]?.() || this.renderNotFoundPage();
            }

            renderLoginPage() {
                return `
                    <div class="max-w-2xl mx-auto mt-24">
                        <div class="glass p-12 rounded-4xl max-w-md mx-auto glass-hover">
                            <div class="text-center mb-10">
                                <div class="w-28 h-28 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center neon-glow">
                                    <i class="fas fa-gamepad text-4xl text-white"></i>
                                </div>
                                <h1 class="gradient-text text-4xl font-black mb-2 tracking-tight">Selamat Datang</h1>
                                <p class="text-gray-400 text-lg">Masuk ke dunia gaming terlengkap</p>
                            </div>
                            <form id="loginForm" class="space-y-4">
                                <div class="glass p-4 rounded-2xl">
                                    <input type="text" id="loginUsername" placeholder="👤 Email / Username" 
                                           class="w-full bg-transparent outline-none text-lg pt-2" required>
                                </div>
                                <div class="glass p-4 rounded-2xl">
                                    <input type="password" id="loginPassword" placeholder="🔒 Password" 
                                           class="w-full bg-transparent outline-none text-lg pt-2" required>
                                </div>
                                <div class="flex items-center gap-3 p-3 glass rounded-2xl">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" id="otpVerify" class="w-4 h-4 text-cyan-500 rounded">
                                        <span class="text-sm">Verifikasi OTP (demo: 123456)</span>
                                    </label>
                                </div>
                                <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 py-5 rounded-2xl font-bold text-xl neon-glow">
                                    <i class="fas fa-sign-in-alt mr-2"></i>Masuk Sekarang
                                </button>
                            </form>
                            <div class="text-center mt-8 p-4 glass rounded-2xl">
                                <p class="text-sm text-gray-400 mb-2">Demo Akun:</p>
                                <div class="text-xs space-y-1">
                                    <div>👑 admin3market / admin123</div>
                                    <div>🛒 budi@email.com / 123456</div>
                                    <div>🏪 seller@email.com / 123456</div>
                                </div>
                            </div>
                            <div class="text-center mt-6">
                                <button id="toRegisterBtn" class="text-cyan-400 hover:text-cyan-300 font-medium underline">
                                    Belum punya akun? Daftar sekarang
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            // ===== EVENT BINDING =====
            bindGlobalEvents() {
                // Mobile menu
                document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('-translate-x-full');
                });

                // Profile modal
                document.getElementById('profileBtn')?.addEventListener('click', () => this.showProfileModal());
                document.getElementById('closeProfileModal')?.addEventListener('click', () => 
                    document.getElementById('profileModal').classList.add('hidden'));
                document.getElementById('logoutBtn')?.addEventListener('click', () => this.logout());

                // Notifications
                document.getElementById('notificationBtn')?.addEventListener('click', () => this.showNotifications());
            }

            bindSidebarEvents() {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const page = btn.dataset.page;
                        if (page) {
                            this.showPage(page);
                            document.getElementById('sidebar')?.classList.add('-translate-x-full');
                        }
                    });
                });

                const createStoreBtn = document.getElementById('createStoreBtn');
                if (createStoreBtn) {
                    createStoreBtn.addEventListener('click', () => this.createStore());
                }
            }

            // ===== UTILITY METHODS =====
            showToast(message, type = 'info') {
                const toastContainer = document.getElementById('toastContainer');
                toastContainer.classList.remove('hidden');
                
                const toast = document.createElement('div');
                toast.className = `glass p-4 rounded-2xl glass-hover animate-slide-in-right max-w-sm shadow-2xl ${
                    type === 'success' ? 'border-l-4 border-emerald-400' :
                    type === 'error' ? 'border-l-4 border-red-400' : 'border-l-4 border-cyan-400'
                }`;
                toast.innerHTML = `
                    <div class="flex items-center gap-3">
                        <i class="fas ${type === 'success' ? 'fa-check-circle text-emerald-400' : 
                                      type === 'error' ? 'fa-exclamation-circle text-red-400' : 
                                      'fa-info-circle text-cyan-400'} text-xl"></i>
                        <span class="font-medium">${message}</span>
                    </div>
                `;
                
                toastContainer.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }

            showSplash() {
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if (!this.currentUser) {
                        this.showPage('login');
                    } else {
                        this.showPage('home');
                    }
                }, 1500);
            }

            // ===== AUTH METHODS ===== (implement as needed)
            async checkAuth() {
                const userData = localStorage.getItem('3m_currentUser');
                if (userData) {
                    this.currentUser = JSON.parse(userData);
                }
            }

            updateCoinDisplay() {
                const coinSpan = document.getElementById('coinAmount');
                if (coinSpan) {
                    coinSpan.textContent = this.currentUser?.coins || 0;
                }
            }

            updateNotificationBadge() {
                const unreadCount = this.db.notifications.filter(n => !n.read).length;
                const badge = document.getElementById('notificationBadge');
                if (badge) {
                    badge.textContent = unreadCount;
                    badge.classList.toggle('hidden', unreadCount === 0);
                }
            }

            updateActiveNav(page) {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('nav-active');
                });
                document.querySelectorAll(`.nav-btn[data-page="${page}"]`).forEach(btn => {
                    btn.classList.add('nav-active');
                });
            }
        }

        // Initialize app
        const app = new MarketApp();
        window.app = app;
    </script>
</body>
</html>
